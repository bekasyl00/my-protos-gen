name: Generate Proto Go Files

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Generator Repository
        uses: actions/checkout@v4

      - name: Verify PAT_TOKEN is available
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "${PAT_TOKEN}" ]; then
            echo "PAT_TOKEN secret is missing or empty"; exit 1;
          fi
          echo "PAT_TOKEN is present"

      - name: Install Protocol Buffers Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone Proto Files Repository
        run: |
          rm -rf proto-source
          git clone --depth 1 https://github.com/bekasyl00/my-protos.git proto-source

      - name: Generate Go Code from Proto Files into ./proto
        run: |
          rm -rf proto
          mkdir -p proto
          find proto-source/proto -name "*.proto" -type f | while read -r file; do
            protoc \
              --proto_path=proto-source \
              --go_out=proto --go_opt=paths=source_relative \
              --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
              "$file"
          done

          echo "Generated files:"
          find proto -type f

      - name: Commit and Push Generated Files
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "bekasyl00"
          git config user.email "bekajaksylyk07@gmail.com"

          git add proto/
          git status

          git commit -m "chore: auto-generate pb.go files" || echo "No changes to commit"

          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/bekasyl00/my-protos-gen.git"
          git push origin HEAD:main
